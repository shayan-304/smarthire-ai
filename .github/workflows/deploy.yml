name: Build & Test SmartHire AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: ✅ Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: 🔨 Build with Maven
      run: mvn clean package -DskipTests

    - name: 🧪 Run Tests
      run: mvn test --fail-at-end

    - name: 📦 Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: smarthire-ai-jar
        path: target/*.jar

    - name: 🐳 Build Docker image
      run: docker build -t smarthire-ai:latest .

    - name: ✔️ Verify Docker image built
      run: docker images smarthire-ai
