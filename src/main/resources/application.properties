# SmartHire AI - Application Configuration

# Server
server.port=${PORT:8080}

# App name
spring.application.name=smarthire-ai

# Google Gemini API (FREE - 1500 requests/day, no billing needed)
# Get your free key at: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:your-gemini-api-key-here}

# Timeouts
spring.mvc.async.request-timeout=90000

# Logging
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
