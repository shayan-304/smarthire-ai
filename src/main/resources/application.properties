# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=smarthire-ai

# ── Groq AI (Free — 14,400 req/day, works in India) ─────────
# Get your free key at: console.groq.com → API Keys
# Set as environment variable GROQ_API_KEY in your deployment
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Timeouts ─────────────────────────────────────────────────
spring.mvc.async.request-timeout=120000

# ── Suppress noisy library logs ──────────────────────────────
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.poi=ERROR
logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.commons=ERROR
