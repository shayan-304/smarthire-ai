# ── Server ────────────────────────────────────────────────────────────────────
# Render injects PORT automatically — falls back to 8080 locally
server.port=${PORT:8080}
spring.application.name=smarthire-ai

# ── Gemini AI API ───────────────────────────────────────────────────────────────
# Google Gemini 1.5 Flash (Generous free tier: 15 RPM, 1,500 RPD)
# Set GEMINI_API_KEY in Render Dashboard → Environment tab
# Get key at: aistudio.google.com
gemini.api.key=${GEMINI_API_KEY:NOT_SET}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Timeouts ──────────────────────────────────────────────────────────────────
spring.mvc.async.request-timeout=120000

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
# IN-MEMORY mode used because Render free tier has ephemeral disk
# (file-based H2 would reset on every redeploy anyway)
# Data is kept for the full session — resets only when the server restarts
# IMPORTANT: Do NOT change to file: mode on Render free tier
spring.datasource.url=jdbc:h2:mem:smarthiredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=smarthire
spring.datasource.password=smarthire123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console — view live data at /h2-console in browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── Suppress noisy library logs ───────────────────────────────────────────────
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.poi=ERROR
logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.commons=ERROR
