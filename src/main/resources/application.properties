# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=smarthire-ai

# ── Groq AI API ──────────────────────────────────────────────────────────────
# Free: 14,400 req/day | Works in India | No credit card
# Set GROQ_API_KEY as environment variable in your deployment platform
# Get your key at: console.groq.com → API Keys
groq.api.key=${GROQ_API_KEY}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Timeouts ─────────────────────────────────────────────────────────────────
spring.mvc.async.request-timeout=120000

# ── Suppress noisy library logs ──────────────────────────────────────────────
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.poi=ERROR
logging.level.org.apache.fontbox=ERROR
logging.level.org.apache.commons=ERROR

# ── H2 Database (embedded — stores all analysis history) ─────────────────────
# FILE mode: data survives app restarts on the same server
spring.datasource.url=jdbc:h2:file:./smarthire-data;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=smarthire
spring.datasource.password=smarthire123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Web Console (view your data at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
