server.port=${PORT:8080}
spring.application.name=smarthire-ai

# Gemini API Key — falls back to the actual key if env var not set
gemini.api.key=${GEMINI_API_KEY:AIzaSyCUKlMVuaAfu5pyxBjWT5ykT0LJGVybarU}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Timeout
spring.mvc.async.request-timeout=120000

# Suppress noisy logs
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.poi=ERROR
logging.level.org.apache.fontbox=ERROR
