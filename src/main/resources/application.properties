# SmartHire AI - Application Configuration

# Server
server.port=${PORT:8080}

# App name
spring.application.name=smarthire-ai

# OpenAI API Configuration
# Set OPENAI_API_KEY as an environment variable - never hardcode your key!
openai.api.key=${OPENAI_API_KEY:your-openai-api-key-here}
openai.api.model=gpt-4o-mini

# Increase timeout for AI responses
spring.mvc.async.request-timeout=90000

# Max request size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.com.smarthire=INFO
logging.level.org.springframework.web=WARN
